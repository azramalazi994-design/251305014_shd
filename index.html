<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengendalian Diri dalam Perspektif Hadis Nabi</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green-dark:  #1a472a;
    --green-mid:   #2d6a4f;
    --gold:        #d4ac5a;
    --gold-light:  #f0e0b0;
    --nav-h:       58px;
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a1a;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── NAVBAR ─────────────────────────────────────── */
  nav {
    height: var(--nav-h);
    background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 8px;
    box-shadow: 0 3px 16px rgba(0,0,0,0.45);
    z-index: 100;
    flex-shrink: 0;
    position: relative;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-right: 16px;
    cursor: pointer;
    text-decoration: none;
  }
  .nav-brand-icon {
    width: 34px; height: 34px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .nav-brand-text {
    display: flex;
    flex-direction: column;
  }
  .nav-brand-text .line1 {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    white-space: nowrap;
  }
  .nav-brand-text .line2 {
    font-size: 10px;
    color: var(--gold-light);
    white-space: nowrap;
  }

  .nav-sep {
    width: 1px; height: 32px;
    background: rgba(255,255,255,0.15);
    margin: 0 8px;
  }

  /* ── DROPDOWN ────────────────────────────────────── */
  .dropdown { position: relative; }

  .dropbtn {
    background: rgba(255,255,255,0.08);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: background .2s, border-color .2s;
    white-space: nowrap;
    font-family: inherit;
  }
  .dropbtn:hover, .dropdown.open .dropbtn {
    background: rgba(255,255,255,0.16);
    border-color: var(--gold);
  }
  .dropbtn .arrow {
    font-size: 9px;
    transition: transform .2s;
    color: var(--gold);
  }
  .dropdown.open .dropbtn .arrow { transform: rotate(180deg); }

  .dropdown-menu {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.22);
    min-width: 280px;
    max-height: 80vh;
    overflow-y: auto;
    z-index: 200;
    border: 1px solid rgba(45,106,79,0.12);
  }
  .dropdown.open .dropdown-menu { display: block; }

  .menu-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--green-mid);
    padding: 10px 16px 6px;
    background: #f5f9f6;
    border-bottom: 1px solid #e0eee5;
  }
  .menu-section-label:not(:first-child) {
    border-top: 2px solid #e0eee5;
  }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    font-size: 13px;
    color: #2a3a30;
    cursor: pointer;
    transition: background .15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
  }
  .menu-item:hover { background: #f0f7f2; }
  .menu-item.active { background: #e8f5ee; color: var(--green-dark); font-weight: 600; }
  .menu-item .mi-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
  .menu-item .mi-sub {
    font-size: 11px;
    color: #8a9a8a;
    margin-left: auto;
    flex-shrink: 0;
  }

  /* Sub-items (H2) slightly indented */
  .menu-item.sub {
    padding-left: 36px;
    font-size: 12.5px;
    color: #4a5a4a;
  }
  .menu-item.sub::before {
    content: '•';
    color: var(--gold);
    font-size: 14px;
    margin-right: 4px;
  }
  .menu-item.sub:hover { background: #f5faf6; }
  .menu-item.sub.active { background: #edf7f0; }

  /* ── HOME BUTTON ─────────────────────────────────── */
  .home-btn {
    background: rgba(212,172,90,0.15);
    color: var(--gold-light);
    border: 1px solid rgba(212,172,90,0.35);
    padding: 7px 13px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background .2s;
    white-space: nowrap;
    font-family: inherit;
  }
  .home-btn:hover { background: rgba(212,172,90,0.28); }

  .nav-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .page-indicator {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    white-space: nowrap;
    font-style: italic;
  }

  /* ── IFRAME ──────────────────────────────────────── */
  .iframe-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  #content-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: #fdfaf5;
  }

  /* Loading overlay */
  .loading {
    position: absolute;
    inset: 0;
    background: rgba(26,26,26,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .loading.show { opacity: 1; pointer-events: all; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(212,172,90,0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" onclick="loadPage('cover.html','home')" href="javascript:void(0)">
    <div class="nav-brand-icon">☪</div>
    <div class="nav-brand-text">
      <span class="line1">Pengendalian Diri</span>
      <span class="line2">dalam Perspektif Hadis Nabi</span>
    </div>
  </a>

  <div class="nav-sep"></div>

  <div class="dropdown" id="dd-pengantar">
    <button class="dropbtn" onclick="toggleDropdown('dd-pengantar')">
      📖 Pengantar <span class="arrow">▼</span>
    </button>
    <div class="dropdown-menu">
      <div class="menu-section-label">Pembuka</div>
      <button class="menu-item" onclick="loadPage('cover.html','home')" data-page="cover.html">
        <span class="mi-icon">🏠</span> Cover / Beranda
      </button>
      <button class="menu-item" onclick="loadPage('pendahuluan.html','pendahuluan')" data-page="pendahuluan.html">
        <span class="mi-icon">✍️</span> Pendahuluan
      </button>
    </div>
  </div>

  <div class="dropdown" id="dd-daftar-bab">
    <button class="dropbtn" onclick="toggleDropdown('dd-daftar-bab')">
      📂 Daftar Bab <span class="arrow">▼</span>
    </button>
    <div class="dropdown-menu">
      <div class="menu-section-label">Bab I — Emosi &amp; Amarah</div>
      <button class="menu-item" onclick="loadPage('bab1.html','bab1')" data-page="bab1.html">
        <span class="mi-icon">📜</span> Buka Bab I
      </button>
      <button class="menu-item sub" onclick="loadPage('bab1.html','bab1')">Kekuatan Sejati</button>
      <button class="menu-item sub" onclick="loadPage('bab1.html','bab1')">Larangan Marah</button>
      <button class="menu-item sub" onclick="loadPage('bab1.html','bab1')">Keutamaan Menahan Amarah</button>
      <button class="menu-item sub" onclick="loadPage('bab1.html','bab1')">Keutamaan Memaafkan</button>

      <div class="menu-section-label">Bab II — Lisan &amp; Ucapan</div>
      <button class="menu-item" onclick="loadPage('bab2.html','bab2')" data-page="bab2.html">
        <span class="mi-icon">📜</span> Buka Bab II
      </button>
      <button class="menu-item sub" onclick="loadPage('bab2.html','bab2')">Menjaga Lisan</button>
      <button class="menu-item sub" onclick="loadPage('bab2.html','bab2')">Bahaya Ucapan</button>
      <button class="menu-item sub" onclick="loadPage('bab2.html','bab2')">Hal Tidak Bermanfaat</button>

      <div class="menu-section-label">Bab III — Syahwat &amp; Konsumsi</div>
      <button class="menu-item" onclick="loadPage('bab3.html','bab3')" data-page="bab3.html">
        <span class="mi-icon">📜</span> Buka Bab III
      </button>
      <button class="menu-item sub" onclick="loadPage('bab3.html','bab3')">Pernikahan &amp; Puasa</button>
      <button class="menu-item sub" onclick="loadPage('bab3.html','bab3')">Larangan Berlebih-lebihan</button>
      <button class="menu-item sub" onclick="loadPage('bab3.html','bab3')">Menjaga Perut</button>

      <div class="menu-section-label">Bab IV — Nafsu &amp; Orientasi Hidup</div>
      <button class="menu-item" onclick="loadPage('bab4.html','bab4')" data-page="bab4.html">
        <span class="mi-icon">📜</span> Buka Bab IV
      </button>
      <button class="menu-item sub" onclick="loadPage('bab4.html','bab4')">Kecerdasan Hakiki</button>
      <button class="menu-item sub" onclick="loadPage('bab4.html','bab4')">Zuhud</button>
      <button class="menu-item sub" onclick="loadPage('bab4.html','bab4')">Bahaya Ketamakan</button>

      <div class="menu-section-label">Bab V — Kesabaran &amp; Spiritual</div>
      <button class="menu-item" onclick="loadPage('bab5.html','bab5')" data-page="bab5.html">
        <span class="mi-icon">📜</span> Buka Bab V
      </button>
      <button class="menu-item sub" onclick="loadPage('bab5.html','bab5')">Kesabaran Sejati</button>
      <button class="menu-item sub" onclick="loadPage('bab5.html','bab5')">Puasa Sunnah</button>
    </div>
  </div>

  <div class="dropdown" id="dd-review-web">
    <button class="dropbtn" onclick="toggleDropdown('dd-review-web')">
      📝 Review Website <span class="arrow">▼</span>
    </button>
    <div class="dropdown-menu">
      <div class="menu-section-label">Dokumen Review (PDF)</div>
      <button class="menu-item" onclick="loadPage('review1.pdf','review1')" data-page="review1.pdf">
        <span class="mi-icon">📄</span> Review Website 1
      </button>
      <button class="menu-item" onclick="loadPage('review2.pdf','review2')" data-page="review2.pdf">
        <span class="mi-icon">📄</span> Review Website 2
      </button>
      <button class="menu-item" onclick="loadPage('review3.pdf','review3')" data-page="review3.pdf">
        <span class="mi-icon">📄</span> Review Website 3
      </button>
      <button class="menu-item" onclick="loadPage('review4.pdf','review4')" data-page="review4.pdf">
        <span class="mi-icon">📄</span> Review Website 4
      </button>
      <button class="menu-item" onclick="loadPage('review5.pdf','review5')" data-page="review5.pdf">
        <span class="mi-icon">📄</span> Review Website 5
      </button>
    </div>
  </div>

  <div class="dropdown" id="dd-penutup">
    <button class="dropbtn" onclick="toggleDropdown('dd-penutup')">
      📚 Referensi <span class="arrow">▼</span>
    </button>
    <div class="dropdown-menu">
      <div class="menu-section-label">Penutup</div>
      <button class="menu-item" onclick="loadPage('pustaka.html','pustaka')" data-page="pustaka.html">
        <span class="mi-icon">📚</span> Daftar Pustaka
      </button>
    </div>
  </div>

  <div class="nav-right">
    <span class="page-indicator" id="page-indicator">Cover / Beranda</span>
  </div>
</nav>

<div class="iframe-wrap">
  <iframe id="content-frame" src="cover.html" title="Konten E-Book"></iframe>
  <div class="loading" id="loading"><div class="spinner"></div></div>
</div>

<script>
  const frame    = document.getElementById('content-frame');
  const loading  = document.getElementById('loading');
  const indicator = document.getElementById('page-indicator');

  const pageLabels = {
    'cover.html':        'Cover / Beranda',
    'pendahuluan.html':  'Pendahuluan',
    'bab1.html':         'Bab I — Pengendalian Emosi & Amarah',
    'bab2.html':         'Bab II — Pengendalian Lisan & Ucapan',
    'bab3.html':         'Bab III — Pengendalian Syahwat & Konsumsi',
    'bab4.html':         'Bab IV — Pengendalian Nafsu & Orientasi Hidup',
    'bab5.html':         'Bab V — Kesabaran & Penguatan Spiritual',
    'pustaka.html':      'Daftar Pustaka',
    'review1.pdf':       'Review Website 1 (PDF)',
    'review2.pdf':       'Review Website 2 (PDF)',
    'review3.pdf':       'Review Website 3 (PDF)',
    'review4.pdf':       'Review Website 4 (PDF)',
    'review5.pdf':       'Review Website 5 (PDF)'
  };

  let currentPage = 'cover.html';

  function loadPage(page, key) {
    closeAllDropdowns();
    if (page === currentPage) return;
    currentPage = page;
    loading.classList.add('show');
    frame.src = page;
    indicator.textContent = pageLabels[page] || page;
  }

  frame.addEventListener('load', () => {
    loading.classList.remove('show');
  });

  function toggleDropdown(id) {
    const el = document.getElementById(id);
    const wasOpen = el.classList.contains('open');
    closeAllDropdowns();
    if (!wasOpen) el.classList.add('open');
  }

  function closeAllDropdowns() {
    document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
  }

  // Close on outside click
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.dropdown')) closeAllDropdowns();
  });
</script>
</body>
</html>
